<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Trophy</title>

  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#12161C">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="app">

    <!-- ============ AUTENTICAZIONE ============ -->
    <section id="vista-auth" class="vista">
      <div class="auth-scena">
        <div class="auth-marchio">
          <span class="auth-marchio-badge"><i class="fa-solid fa-trophy"></i></span>
          <div>
            <h1>Trophy</h1>
            <p>Crea, organizza e aggiorna i tuoi campionati.</p>
          </div>
        </div>
        <div class="auth-card" id="auth-card"></div>
        <div class="auth-link-gruppo">
          <button id="btn-ospite" class="link-ospite">Continua senza account</button>
          <button id="btn-reset-dati" class="link-reset">Problemi ad accedere? Cancella i dati locali</button>
        </div>
      </div>
    </section>

    <!-- ============ APP (dashboard / wizard / torneo) ============ -->
    <div id="shell" class="vista">
      <header id="header-app">
        <div class="brand" id="btn-brand">
          <span class="brand-badge"><i class="fa-solid fa-trophy"></i></span>
          <span class="brand-nome">Trophy</span>
        </div>
        <nav id="nav-header-link">
          <button id="btn-nav-squadre-globali" class="btn btn-testo"><i class="fa-solid fa-people-roof"></i> Le mie squadre</button>
        </nav>
        <div id="utente-info">
          <span id="nome-utente"></span>
          <button id="btn-logout" class="btn btn-testo">Esci</button>
        </div>
      </header>

      <main id="main-app">

        <!-- ---- DASHBOARD ---- -->
        <section id="vista-dashboard" class="sotto-vista">
          <div class="dashboard-testata">
            <div>
              <span class="eyebrow">I tuoi campionati</span>
              <h1>Dashboard</h1>
            </div>
            <button id="btn-nuovo-torneo" class="btn btn-primario"><i class="fa-solid fa-plus"></i> Nuovo torneo</button>
          </div>
          <div id="dashboard-ricerca-contenitore"></div>
          <div id="lista-tornei" class="griglia-tornei"></div>
        </section>

        <!-- ---- WIZARD CREAZIONE TORNEO ---- -->
        <section id="vista-wizard" class="sotto-vista">
          <div id="wizard-contenuto"></div>
        </section>

        <!-- ---- GESTIONE TORNEO ---- -->
        <section id="vista-torneo" class="sotto-vista">
          <div id="torneo-layout">
            <nav id="torneo-sidebar">
              <div id="torneo-sidebar-titolo"></div>
              <button class="tab-torneo" data-tab="classifica"><i class="fa-solid fa-ranking-star"></i> Classifica</button>
              <button class="tab-torneo" data-tab="calendario"><i class="fa-solid fa-calendar-days"></i> Calendario</button>
              <button class="tab-torneo" data-tab="squadre"><i class="fa-solid fa-shield-halved"></i> Squadre</button>
              <button class="tab-torneo" data-tab="giocatori"><i class="fa-solid fa-person-running"></i> Giocatori</button>
              <button class="tab-torneo" data-tab="campi"><i class="fa-solid fa-location-dot"></i> Campi</button>
              <button class="tab-torneo" data-tab="news"><i class="fa-solid fa-newspaper"></i> News</button>
              <button class="tab-torneo" data-tab="statistiche"><i class="fa-solid fa-chart-simple"></i> Statistiche</button>
              <button class="tab-torneo" data-tab="impostazioni"><i class="fa-solid fa-gear"></i> Impostazioni</button>
              <button id="btn-torna-dashboard"><i class="fa-solid fa-arrow-left"></i> Tutti i tornei</button>
              <button id="btn-apri-schermo"><i class="fa-solid fa-tv"></i> Modalità schermo</button>
              <div id="sponsor-sidebar"></div>
            </nav>
            <div id="torneo-contenuto"></div>
          </div>
        </section>

        <!-- ---- LE MIE SQUADRE (cross-torneo) ---- -->
        <section id="vista-squadre-globali" class="sotto-vista">
          <div class="dashboard-testata">
            <div>
              <span class="eyebrow">Statistiche all-time</span>
              <h1>Le mie squadre</h1>
            </div>
            <button id="btn-nuova-squadra-globale" class="btn btn-primario"><i class="fa-solid fa-plus"></i> Nuova squadra</button>
          </div>
          <p class="sottotitolo" style="margin-bottom:20px; max-width:640px;">
            Collega qui le squadre che partecipano a più tornei, per tenere un'unica storia e statistiche complessive tra un campionato e l'altro.
          </p>
          <div id="lista-squadre-globali" class="griglia-squadre-estesa"></div>
        </section>

      </main>
    </div>
  </div>

  <!-- ============ MODALITÀ MAXI-SCHERMO ============ -->
  <section id="vista-schermo">
    <button id="btn-chiudi-schermo"><i class="fa-solid fa-xmark"></i></button>
    <div id="schermo-intestazione"></div>
    <div id="schermo-contenuto"></div>
  </section>

  <!-- ============ MODALE: gestione partita ============ -->
  <div id="modale-partita" class="overlay">
    <div class="modale-card">
      <i class="fa-solid fa-xmark modale-chiudi" id="chiudi-modale-partita"></i>
      <div id="modale-partita-contenuto"></div>
    </div>
  </div>

  <div id="toast-contenitore"></div>

  <script src="core-storage.js"></script>
  <script src="core-auth.js"></script>
  <script src="core-utils.js"></script>
  <script src="formati-registry.js"></script>
  <script src="formato-campionato.js"></script>
  <script src="formato-gironi.js"></script>
  <script src="formato-eliminazione.js"></script>
  <script src="formato-mista.js"></script>
  <script src="dati-statistiche.js"></script>
  <script src="dati-tornei.js"></script>
  <script src="dati-squadre-globali.js"></script>
  <script src="app-core.js"></script>
  <script src="app-auth.js"></script>
  <script src="app-dashboard.js"></script>
  <script src="app-wizard.js"></script>
  <script src="app-torneo.js"></script>
  <script src="app-squadre.js"></script>
  <script src="app-squadre-globali.js"></script>
  <script src="app-campi.js"></script>
  <script src="app-news.js"></script>
  <script src="app-statistiche.js"></script>
  <script src="app-partita.js"></script>
  <script src="app-schermo.js"></script>
</body>
</html>
